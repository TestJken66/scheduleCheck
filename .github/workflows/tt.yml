          curl -L -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GITHUB_TOKEN" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/TestJken66/temp/actions/workflows/auto-register.yml/dispatches" -d '{"ref":"main"}'
